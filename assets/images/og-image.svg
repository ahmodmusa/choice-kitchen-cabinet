<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090139"/>
      <stop offset="100%" stop-color="#1a0a4d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric pattern -->
  <circle cx="100" cy="100" r="300" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#ffffff" fill-opacity="0.02"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Center content group -->
  <g transform="translate(600, 80)">

    <!-- Real Logo Circle -->
    <circle cx="0" cy="60" r="70" fill="#090139" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4"/>
    <circle cx="0" cy="60" r="58" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
    <text x="0" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="1">CKC</text>

    <!-- Gap -->

    <!-- Brand name -->
    <text x="0" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="600" fill="#ffffff" letter-spacing="2">Choice Kitchen Cabinet</text>

    <!-- Gap -->

    <!-- Tagline -->
    <text x="0" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="#ffffff" fill-opacity="0.85" letter-spacing="4">PREMIUM CUSTOM KITCHEN CABINETS</text>

    <!-- Gap -->

    <!-- Location pill -->
    <rect x="-210" y="285" width="420" height="50" rx="25" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="0" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="400" fill="#ffffff" fill-opacity="0.95">Serving Kuala Lumpur, Selangor &amp; Klang Valley</text>

    <!-- Gap -->

    <!-- Decorative line -->
    <line x1="-100" y1="365" x2="100" y2="365" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25"/>

    <!-- Gap -->

    <!-- CTA text -->
    <text x="0" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#ffffff" fill-opacity="0.6">Free Design Consultation &amp; Quote  |  WhatsApp: +60 17-836 0455</text>

    <!-- Trust badges row -->
    <text x="0" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#ffffff" fill-opacity="0.45">500+ Happy Families  |  1-Year Warranty  |  Free Installation</text>

  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#ffffff" fill-opacity="0.08"/>
</svg>
